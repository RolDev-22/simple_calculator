<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple-Calculator</title>
    <link rel="stylesheet" href="./style/style.css">
    <script src="./function/script.js" defer></script>
    <script src="./function/funtionality.js" defer></script>
</head>

<body>
    <header>
        <h5>SIMPLE CALCULATOR</h5>
        <h6 id="timer"></h6>
    </header>
    <main>
        <section class="bodyCalculator">
            <input type="text" id="screen" disabled>
            <div class="containerButtons">
                <div class="row">
                    <button class="buttonClass action" onclick="handleReset()">AC</button>
                    <button class="buttonClass action" onclick="handleDelete()">C</button>
                    <button class="buttonClass function">%</button>
                    <button class="buttonClass function" onclick="handleDivision()">÷</button>
                </div>
                <div class="row">
                    <button class="buttonClass" value="7">7</button>
                    <button class="buttonClass" value="8">8</button>
                    <button class="buttonClass" value="9">9</button>
                    <button class="buttonClass function" onclick="handleMultiplication()">x</button>

                </div>
                <div class="row">
                    <button class="buttonClass" value="4">4</button>
                    <button class="buttonClass" value="5">5</button>
                    <button class="buttonClass" value="6">6</button>
                    <button class="buttonClass function" onclick="handleAddition()">+</button>

                </div>
                <div class="row">
                    <button class="buttonClass" value="1">1</button>
                    <button class="buttonClass" value="2">2</button>
                    <button class="buttonClass" value="3">3</button>
                    <button class=" buttonClass function" onclick="handleSubstraction()">-</button>
                </div>
                <div class="row">
                    <button class="buttonClass" value="0">0</button>
                    <button class="buttonClass" value="00">00</button>
                    <button class="buttonClass action" value=".">.</button>
                    <button class="buttonClass function" onclick="handleEqual()">=</button>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <h5>Created by RolDev-22</h5>
        <h6>Copyright © 2026</h6>
    </footer>
</body>

</html>
